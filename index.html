<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>LGBTQ+ Project</title>
        <link rel="stylesheet" href="css/c01.css"/>
    </head>
    <body>
        <!-- Announcement Box -->
        <div id="announcement" class="announcement">
            <button class="close-btn1" onclick="closeAnnouncement()">✖</button>
            <p><strong>Coming soon in 2025!</strong></p>
            <p class="inquiry">
                For inquiries, email at
                <a href="mailto: info@lgbtqplusproject.org" style="color: #4DA6FF; text-decoration: none;">
                    info@lgbtqplusproject.org
                </a>
            </p>
        </div>

        <!-- Landing Page with Logo -->
        <section id="landing">
            <img src="/Users/mateocarnavali/Desktop/LGBTQPlusProject/images/lgbptqprojectLogov3.gif" alt="Logo" id="logo">
            <div id="scroll-indicator">Scroll Down ↓</div>
        </section>

            <!-- Main Content -->
            <section id="content">
                <h1>UNDER CONSTRUCTION</h1>
                <input type="text" id="searchBox" placeholder="Search LGBTQ+ Figures..." />
                <button onclick="searchDatabase()">Search</button>

                <!-- Search Results Box -->
                <div id="searchResultsBox" class="search-box">
                    <button class="close-btn2" onclick="closeSearchBox()">×</button>
                    <div id="searchResultsContainer"></div>  <!-- This is where the results will appear -->
                </div>
            </section>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                setTimeout(() => {
                    document.getElementById("announcement").classList.add("show");
                }, 1000); // Delay before fade-in
            });

            function closeAnnouncement() {
                const box = document.getElementById("announcement");
                box.style.opacity = "0";
                setTimeout(() => {
                    box.style.visibility = "hidden";
                }, 1500); // Matches fade-out time
            }
        </script>
        <script src="script.js"></script>
    </body>
</html>
