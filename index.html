<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>LGBTQ+ Project</title>
        <link rel="stylesheet" href="css/c01.css"/>
    </head>
    <body>
        <h1> </h1>
        <body>
            <!-- Announcement Box -->
            <div id="announcement" class="announcement">
                <button class="close-btn" onclick="closeAnnouncement()">✖</button>
                <p><strong>Coming soon in 2025!</strong></p>
                <p class="inquiry">For inquiries, email at <a href="mailto:lgbtqplusproject@outlook.com" style="color: #4DA6FF; text-decoration: none;">lgbtqplusproject@outlook.com</a></p>
            </div>
            
            <!-- Landing Page with Logo -->
            <section id="landing">
                <img src="/Users/mateocarnavali/Desktop/LGBTQPlusProject/images/lgbptqprojectLogov3.gif" alt="Logo" id="logo">
                <div id="scroll-indicator">Scroll Down ↓</div>
            </section>

            <!-- Main Content -->
            <section id="content">
                <h1>Welcome to the Content Section</h1>
                <p>This is where stuff is going to go.</p>
                <input type="text" id="searchBox" placeholder="LGBTQ+ History..." />
                <button onclick="searchDatabase()">Search</button>
                <div id="searchResults"></div>
            </section>

            <script>
                document.addEventListener("DOMContentLoaded", function() {
                            setTimeout(() => {
                                document.getElementById("announcement").classList.add("show");
                            }, 1000); // Delay before fade-in
                        });

                        function closeAnnouncement() {
                            const box = document.getElementById("announcement");
                            box.style.opacity = "0";
                            setTimeout(() => {
                                box.style.visibility = "hidden";
                            }, 1500); // Matches fade-out time
                        }
            </script>
    </body>
        <script src="script.js"></script>
<html>
