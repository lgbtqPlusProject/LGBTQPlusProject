<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>LGBTQ+ Project</title>
        <link rel="stylesheet" href="css/c01.css"/>
    </head>
    <body>
        <h1> </h1>
        <body>
            <!-- Announcement Box -->
            <div id="announcement" class="announcement">
                <button class="close-btn" onclick="closeAnnouncement()">✖</button>
                <p><strong>Coming soon in 2025!</strong></p>
                <p class="inquiry">For inquiries, email at <a href="mailto:lgbtqplusproject@outlook.com" style="color: #4DA6FF; text-decoration: none;">lgbtqplusproject@outlook.com</a></p>
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", function() {
                            setTimeout(() => {
                                document.getElementById("announcement").classList.add("show");
                            }, 1000); // Delay before fade-in
                        });

                        function closeAnnouncement() {
                            const box = document.getElementById("announcement");
                            box.style.opacity = "0";
                            setTimeout(() => {
                                box.style.visibility = "hidden";
                            }, 1500); // Matches fade-out time
                        }
            </script>
    </body>
<html>
